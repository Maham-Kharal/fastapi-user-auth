<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Library Assistant — Sign In</title>
<meta name="description" content="Sign in to the Library Assistant to search books, check availability, and manage your loans." />
<!-- Google Fonts — matching ws_test.html exactly -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  /* ── Design tokens (identical to ws_test.html) ── */
  :root {
    --bg-cream: #FAF8F5;
    --bg-card: #FFFFFF;
    --accent-gold: #C5A059;
    --accent-gold-light: #F7F3EA;
    --accent-gold-hover: #B48F49;
    --accent-green: #6C8E75;
    --accent-green-light: #EBF2ED;
    --accent-green-hover: #5B7A63;
    --text-main: #2F3E33;
    --text-muted: #728075;
    --border-color: #EAE5DB;
    --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 8px 30px rgba(108, 142, 117, 0.1);
    --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.08);
    --font-sans: 'Outfit', sans-serif;
    --font-serif: 'Playfair Display', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background-color: var(--bg-cream);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* ── Page wrapper ── */
  .page-wrapper {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Brand header ── */
  .brand-header {
    display: flex;
    align-items: center;
    gap: 14px;
    justify-content: center;
  }

  .avatar {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-hover));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    box-shadow: 0 4px 14px rgba(197, 160, 89, 0.35);
  }

  .brand-text h1 {
    font-family: var(--font-serif);
    font-size: 24px;
    font-weight: 700;
    color: var(--text-main);
  }

  .brand-text p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ── Card ── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 32px;
    box-shadow: var(--shadow-md);
  }

  .card-title {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 6px;
  }

  .card-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  /* ── Form fields ── */
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-main);
  }

  input[type="text"],
  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    font-family: var(--font-sans);
    font-size: 14px;
    background-color: var(--bg-cream);
    color: var(--text-main);
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  input:focus {
    border-color: var(--accent-green);
    box-shadow: 0 0 0 3px rgba(108, 142, 117, 0.12);
  }

  /* ── Primary button ── */
  .btn-primary {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background-color: var(--accent-green);
    color: #fff;
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: background-color 0.2s ease, transform 0.1s ease;
    box-shadow: 0 4px 12px rgba(108, 142, 117, 0.25);
  }

  .btn-primary:hover { background-color: var(--accent-green-hover); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary:disabled {
    background-color: #b0c4b5;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* ── Error message ── */
  .error-msg {
    font-size: 13px;
    color: #b3453a;
    min-height: 18px;
    margin-bottom: 6px;
    text-align: center;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  /* ── Toggle link ── */
  .toggle-row {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .toggle-row a {
    color: var(--accent-green);
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .toggle-row a:hover { border-bottom-color: var(--accent-green); }

  /* ── Hidden util ── */
  .hidden { display: none; }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border-color);
    margin: 18px 0;
  }

  /* ── Success flash ── */
  .success-msg {
    font-size: 13px;
    color: var(--accent-green-hover);
    text-align: center;
    min-height: 18px;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="page-wrapper">

  <!-- Brand -->
  <div class="brand-header">
    <div class="avatar">📚</div>
    <div class="brand-text">
      <h1>Library Assistant</h1>
      <p>Warm, helpful library book advisor</p>
    </div>
  </div>

  <!-- Card -->
  <div class="card">
    <h2 class="card-title" id="formTitle">Welcome back</h2>
    <p class="card-subtitle" id="formSubtitle">Sign in to access the library chat</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="field">
        <label for="loginUser">Username or Email</label>
        <input type="text" id="loginUser" placeholder="Enter your username or email" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="loginPass">Password</label>
        <input type="password" id="loginPass" placeholder="Enter your password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="hidden">
      <div class="field">
        <label for="regUsername">Username</label>
        <input type="text" id="regUsername" placeholder="Choose a username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" placeholder="Create a password" autocomplete="new-password" required />
      </div>
      <button type="submit" class="btn-primary" id="registerBtn">Create Account</button>
    </form>

    <div class="toggle-row">
      <span id="toggleText">
        Don't have an account? <a id="toggleLink">Sign up</a>
      </span>
    </div>
  </div>

</div>

<script>
  const loginForm      = document.getElementById("loginForm");
  const registerForm   = document.getElementById("registerForm");
  const toggleLink     = document.getElementById("toggleLink");
  const toggleText     = document.getElementById("toggleText");
  const formTitle      = document.getElementById("formTitle");
  const formSubtitle   = document.getElementById("formSubtitle");
  const errorMsg       = document.getElementById("errorMsg");
  const successMsg     = document.getElementById("successMsg");

  let showingLogin = true;

  // ── Redirect if already logged in ─────────────────────────────────────────
  if (localStorage.getItem("token")) {
    window.location.href = "chat.html";
  }

  // ── Toggle between Login / Register ───────────────────────────────────────
  function rebindToggle() {
    document.getElementById("toggleLink").addEventListener("click", doToggle);
  }

  function doToggle() {
    showingLogin = !showingLogin;
    loginForm.classList.toggle("hidden", !showingLogin);
    registerForm.classList.toggle("hidden", showingLogin);

    formTitle.textContent    = showingLogin ? "Welcome back" : "Create an account";
    formSubtitle.textContent = showingLogin
      ? "Sign in to access the library chat"
      : "Join the Library Assistant";

    toggleText.innerHTML = showingLogin
      ? 'Don\'t have an account? <a id="toggleLink">Sign up</a>'
      : 'Already have an account? <a id="toggleLink">Sign in</a>';

    rebindToggle();
    errorMsg.textContent  = "";
    successMsg.textContent = "";
  }

  toggleLink.addEventListener("click", doToggle);

  // ── Login ──────────────────────────────────────────────────────────────────
  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorMsg.textContent  = "";
    successMsg.textContent = "";

    const btn = document.getElementById("loginBtn");
    btn.disabled = true;
    btn.textContent = "Signing in…";

    const username_or_email = document.getElementById("loginUser").value.trim();
    const password          = document.getElementById("loginPass").value;

    try {
      const res = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username_or_email, password }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || "Login failed. Please check your credentials.");
      }

      const data = await res.json();
      // Save token — ws_test.html reads this automatically
      localStorage.setItem("token", data.access_token);
      successMsg.textContent = "Signed in! Redirecting…";

      setTimeout(() => {
        window.location.href = "chat.html";
      }, 400);

    } catch (err) {
      errorMsg.textContent = err.message;
      btn.disabled    = false;
      btn.textContent = "Sign In";
    }
  });

  // ── Register ───────────────────────────────────────────────────────────────
  registerForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorMsg.textContent  = "";
    successMsg.textContent = "";

    const btn = document.getElementById("registerBtn");
    btn.disabled = true;
    btn.textContent = "Creating account…";

    const username = document.getElementById("regUsername").value.trim();
    const email    = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;

    try {
      const res = await fetch("/auth/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || "Registration failed.");
      }

      successMsg.textContent = "Account created! Please sign in.";
      // Switch back to login after a short delay
      setTimeout(() => {
        doToggle();
        successMsg.textContent = "";
      }, 1200);

    } catch (err) {
      errorMsg.textContent = err.message;
      btn.disabled    = false;
      btn.textContent = "Create Account";
    }
  });
</script>
</body>
</html>
