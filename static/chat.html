<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sweet Crumbs Bakery — Chat</title>
<style>
  :root {
    --cream: #FBF7EF;
    --cream-dark: #F1E9D8;
    --green: #8FBC94;
    --green-dark: #5C8A66;
    --green-darker: #3F6B49;
    --text: #33422E;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--cream);
    color: var(--text);
    height: 100vh;
    display: flex;
  }

  /* Sidebar */
  #sidebar {
    width: 240px;
    background: #fff;
    border-right: 1px solid var(--cream-dark);
    display: flex;
    flex-direction: column;
    padding: 16px;
  }
  #sidebar h2 {
    font-size: 15px;
    color: var(--green-darker);
    margin: 0 0 12px;
  }
  #newSessionBtn {
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: var(--green-dark);
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    margin-bottom: 12px;
  }
  #newSessionBtn:hover { background: var(--green-darker); }
  #sessionList { list-style: none; margin: 0; padding: 0; overflow-y: auto; flex: 1; }
  #sessionList li {
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    margin-bottom: 4px;
    color: #55624f;
  }
  #sessionList li:hover { background: var(--cream); }
  #sessionList li.active { background: var(--green); color: #fff; }
  #logoutBtn {
    margin-top: 12px;
    background: none;
    border: 1px solid var(--cream-dark);
    color: #8a7e6a;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
  }

  /* Main chat area */
  #main { flex: 1; display: flex; flex-direction: column; }
  #chatHeader {
    padding: 14px 20px;
    border-bottom: 1px solid var(--cream-dark);
    font-weight: 600;
    color: var(--green-darker);
    background: #fff;
  }
  #status { font-size: 12px; font-weight: 400; color: #8a9585; margin-left: 8px; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bubble {
    max-width: 65%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
    white-space: pre-wrap;
  }
  .bubble.user {
    align-self: flex-end;
    background: var(--green);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.assistant {
    align-self: flex-start;
    background: #fff;
    border: 1px solid var(--cream-dark);
    border-bottom-left-radius: 4px;
  }

  #inputBar {
    display: flex;
    padding: 14px 20px;
    border-top: 1px solid var(--cream-dark);
    background: #fff;
    gap: 10px;
  }
  #messageInput {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--cream-dark);
    border-radius: 20px;
    font-size: 14px;
    background: var(--cream);
  }
  #messageInput:focus { outline: 2px solid var(--green); border-color: transparent; }
  #sendBtn {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: var(--green-dark);
    color: #fff;
    cursor: pointer;
    font-weight: 600;
  }
  #sendBtn:hover { background: var(--green-darker); }
  #sendBtn:disabled { background: #b9c9b3; cursor: not-allowed; }

  #emptyState {
    margin: auto;
    text-align: center;
    color: #9aa694;
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Sweet Crumbs Chat</h2>
  <button id="newSessionBtn">+ New conversation</button>
  <ul id="sessionList"></ul>
  <button id="logoutBtn">Log out</button>
</div>

<div id="main">
  <div id="chatHeader">
    <span id="headerTitle">Select or start a conversation</span>
    <span id="status"></span>
  </div>
  <div id="messages"><div id="emptyState">No conversation selected yet.</div></div>
  <div id="inputBar">
    <input id="messageInput" type="text" placeholder="Ask about cakes, flavors, orders…" disabled />
    <button id="sendBtn" disabled>Send</button>
  </div>
</div>

<script>
  const token = localStorage.getItem("token");
  if (!token) window.location.href = "login.html";

  const authHeaders = {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${token}`,
  };

  let currentSessionId = null;

  const sessionListEl = document.getElementById("sessionList");
  const messagesEl = document.getElementById("messages");
  const messageInput = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");
  const statusEl = document.getElementById("status");
  const headerTitle = document.getElementById("headerTitle");

  document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem("token");
    window.location.href = "login.html";
  });

  async function apiFetch(url, options = {}) {
    const res = await fetch(url, { ...options, headers: { ...authHeaders, ...(options.headers || {}) } });
    if (res.status === 401) {
      localStorage.removeItem("token");
      window.location.href = "login.html";
      return null;
    }
    return res;
  }

  async function loadSessions() {
    const res = await apiFetch("/chat/sessions");
    if (!res) return;
    const sessions = await res.json();
    sessionListEl.innerHTML = "";
    sessions.forEach((s) => {
      const li = document.createElement("li");
      li.textContent = s.title || `Conversation #${s.id}`;
      li.dataset.id = s.id;
      if (s.id === currentSessionId) li.classList.add("active");
      li.addEventListener("click", () => selectSession(s.id, li.textContent));
      sessionListEl.appendChild(li);
    });
  }

  async function selectSession(id, title) {
    currentSessionId = id;
    headerTitle.textContent = title;
    messageInput.disabled = false;
    sendBtn.disabled = false;
    [...sessionListEl.children].forEach((li) =>
      li.classList.toggle("active", Number(li.dataset.id) === id)
    );

    const res = await apiFetch(`/chat/sessions/${id}/messages`);
    if (!res) return;
    const history = await res.json();
    renderMessages(history);
  }

  function renderMessages(history) {
    messagesEl.innerHTML = "";
    if (history.length === 0) {
      messagesEl.innerHTML = '<div id="emptyState">Say hello to start the conversation.</div>';
      return;
    }
    history.forEach((m) => appendBubble(m.role, m.content));
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendBubble(role, text) {
    const emptyState = document.getElementById("emptyState");
    if (emptyState) emptyState.remove();
    const div = document.createElement("div");
    div.className = `bubble ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  document.getElementById("newSessionBtn").addEventListener("click", async () => {
    const title = prompt("Name this conversation (optional):", "");
    const res = await apiFetch("/chat/sessions", {
      method: "POST",
      body: JSON.stringify({ title: title || null }),
    });
    if (!res) return;
    const session = await res.json();
    await loadSessions();
    selectSession(session.id, session.title || `Conversation #${session.id}`);
  });

  async function streamMessage(sessionId, content, onChunk, onDone, onError) {
    try {
      const res = await apiFetch(`/chat/sessions/${sessionId}/stream`, {
        method: "POST",
        body: JSON.stringify({ content }),
      });
      if (!res || !res.ok) throw new Error("Stream request failed");

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const parts = buffer.split("\n\n");
        buffer = parts.pop();

        for (const part of parts) {
          if (!part.startsWith("data: ")) continue;
          const raw = part.slice(6).trim();
          if (raw === "[DONE]") { onDone(); return; }
          try {
            const { chunk } = JSON.parse(raw);
            onChunk(chunk);
          } catch { /* ignore malformed chunk */ }
        }
      }
      onDone();
    } catch (err) {
      onError(err);
    }
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text || !currentSessionId) return;

    messageInput.value = "";
    sendBtn.disabled = true;
    messageInput.disabled = true;
    statusEl.textContent = "thinking…";

    appendBubble("user", text);
    const assistantBubble = appendBubble("assistant", "");

    await streamMessage(
      currentSessionId,
      text,
      (chunk) => { assistantBubble.textContent += chunk; messagesEl.scrollTop = messagesEl.scrollHeight; },
      () => {
        statusEl.textContent = "";
        sendBtn.disabled = false;
        messageInput.disabled = false;
        messageInput.focus();
        loadSessions(); // refresh titles/order in case anything changed
      },
      (err) => {
        statusEl.textContent = "error";
        assistantBubble.textContent = "Something went wrong — please try again.";
        sendBtn.disabled = false;
        messageInput.disabled = false;
      }
    );
  }

  sendBtn.addEventListener("click", sendMessage);
  messageInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  loadSessions();
</script>
</body>
</html>
